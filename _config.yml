# Informations du site
title: "Élodie HEINRY | Data Analyste"
description: "Portfolio professionnel d'une Data Analyste Junior"
baseurl: ""
url: "https://elo3534.github.io"
lang: fr

# Thème officiel GitHub Pages
remote_theme: pages-themes/cayman
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Logo (évite les espaces)
logo: assets/images/logo.png

# Navigation
header_pages:
  - README.md

# Liens sociaux
social:
  - name: LinkedIn
    icon: linkedin
    url: https://linkedin.com/in/elodie-heinry
  - name: GitHub
    icon: github
    url: https://github.com/Elo3534

# CSS personnalisé
sass:
  style: compressed

# Markdown
markdown: kramdown

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/


